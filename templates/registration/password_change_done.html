{% extends 'base.html' %}

{% block title %}Password Changed | Personal Tracker{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card-hero p-5 rounded-4 text-white text-center">

                <!-- Success icon -->
                <div class="mx-auto mb-3 d-flex align-items-center justify-content-center rounded-circle"
                    style="width:72px;height:72px;background:linear-gradient(135deg,#10b981,#059669);">
                    <i class="fa-solid fa-check" style="font-size:1.8rem;color:#fff;"></i>
                </div>

                <h2 class="fw-bold font-outfit mb-2">Password Updated!</h2>
                <p class="text-muted-custom mb-4">Your password has been changed successfully.<br>You are still logged in.</p>

                <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                    <a href="{% url 'profile' %}" class="btn btn-primary-gradient rounded-pill px-4 py-2 fw-semibold shadow-lg">
                        <i class="fa-solid fa-user me-2"></i>Back to Profile
                    </a>
                    <a href="{% url 'home' %}" class="btn btn-outline-custom rounded-pill px-4 py-2 fw-semibold">
                        <i class="fa-solid fa-house me-2"></i>Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
