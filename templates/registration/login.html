{% extends 'base.html' %}

{% block title %}Log In | Personal Tracker{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card-hero p-5 rounded-4 text-white">
                <div class="text-center mb-4">
                    <div class="brand-icon-wrapper mx-auto mb-3" style="width: 50px; height: 50px;">
                        <i class="fa-solid fa-lock text-gradient" style="font-size: 1.5rem;"></i>
                    </div>
                    <h2 class="fw-bold font-outfit mb-1">Welcome Back</h2>
                    <p class="text-muted-custom small">Sign in to manage your income streams</p>
                </div>

                {% if form.errors %}
                <div class="alert alert-danger border-0 bg-danger bg-opacity-20 text-white rounded-3 small py-2 mb-4">
                    <i class="fa-solid fa-circle-exclamation me-2"></i> Invalid username or password.
                </div>
                {% endif %}

                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_username" class="form-label text-muted-custom small fw-medium">Username</label>
                        <input type="text" name="username" id="id_username" class="form-control bg-dark-custom text-white border-glass" required placeholder="Enter username">
                    </div>
                    
                    <div class="mb-4">
                        <label for="id_password" class="form-label text-muted-custom small fw-medium">Password</label>
                        <input type="password" name="password" id="id_password" class="form-control bg-dark-custom text-white border-glass" required placeholder="Enter password">
                    </div>

                    <button type="submit" class="btn btn-primary-gradient w-100 py-3 rounded-pill fw-semibold shadow-lg">
                        Sign In
                    </button>
                </form>
                
                <div class="text-center mt-4">
                    <p class="text-muted-custom small mb-0">Don't have an account? <a href="{% url 'signup' %}" class="text-gradient-alt fw-semibold text-decoration-none">Sign Up</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
