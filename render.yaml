# Render Blueprint Specification
# See https://render.com/docs/yaml-spec for more details
services:
  - type: web
    name: expense-tracker
    env: python
    buildCommand: "./build_files.sh"
    startCommand: "gunicorn config.wsgi:application"
    # The release command runs automatically after a successful build, before the new deploy is active
    releaseCommand: "python manage.py migrate"
    envVars:
      - key: DATABASE_URL
        sync: false # User will set their Neon database URL in the Render Dashboard
      - key: SECRET_KEY
        generateValue: true # Generates a random secure secret key automatically on Render
      - key: DEBUG
        value: "False"
